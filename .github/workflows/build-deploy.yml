name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0-dev.1)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${{ inputs.version }}"
          BUILD="$(git rev-parse --short HEAD)"
          TIME="$(date -u '+%Y-%m-%d_%I:%M:%S%p')"
          go build \
            -ldflags "-X=main.Build=${BUILD} -X=main.BuildTime=${TIME} -X=main.Version=${VERSION}" \
            -o versitygw-linux-amd64 \
            cmd/versitygw/*.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: true
          generate_release_notes: true
          files: versitygw-linux-amd64
